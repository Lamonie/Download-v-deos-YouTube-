<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 450px; background: #1a1a1a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; }
        label { font-size: 14px; color: #aaa; margin-bottom: 5px; display: block; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, select { background: #000; color: #fff; border: 1px solid #333; }
        button { background: #e50914; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; }
        #resultado { display: none; text-align: center; background: #222; padding: 20px; border-radius: 8px; margin-top: 10px; }
        .btn-baixar { display: inline-block; background: #2ecc71; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; }
        #statusTexto { font-size: 13px; color: #ffcc00; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        
        <label for="url">Link do Vídeo:</label>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        
        <button id="btnGerar">Preparar Vídeo</button>
        <p id="statusTexto"></p>

        <div id="resultado">
            <p style="margin-top: 0; color: #ccc;">✅ Vídeo processado com sucesso!</p>
            <a id="linkDownload" class="btn-baixar" href="#" target="_blank">⬇️ Baixar Arquivo</a>
        </div>
    </div>

    <script>
        document.getElementById('btnGerar').onclick = async () => {
            const url = document.getElementById('url').value;
            const btn = document.getElementById('btnGerar');
            const resultado = document.getElementById('resultado');
            const status = document.getElementById('statusTexto');
            
            if(!url.includes('youtu')) return alert('Insira um link válido do YouTube.');

            btn.innerText = "Conectando ao servidor...";
            btn.style.opacity = "0.7";
            resultado.style.display = 'none';
            status.innerText = "Iniciando processamento (pode levar alguns segundos)...";

            try {
                // Passo 1: Pede ao Y2Mate/OceanSaver para iniciar a conversão
                const req = await fetch(`https://p.oceansaver.in/ajax/download.php?format=mp4&url=${encodeURIComponent(url)}`);
                const data = await req.json();
                
                if (data.success && data.id) {
                    status.innerText = "Vídeo encontrado! Extraindo o arquivo...";
                    
                    // Passo 2: O site fica perguntando ao servidor a cada 3 segundos se o vídeo está pronto
                    const checkInterval = setInterval(async () => {
                        try {
                            const progReq = await fetch(`https://p.oceansaver.in/ajax/progress.php?id=${data.id}`);
                            const progData = await progReq.json();
                            
                            if (progData.success && progData.progress === 1000) {
                                // O vídeo terminou de processar!
                                clearInterval(checkInterval);
                                document.getElementById('linkDownload').href = progData.download_url;
                                resultado.style.display = 'block';
                                status.innerText = "";
                                btn.innerText = "Preparar Novo Vídeo";
                                btn.style.opacity = "1";
                            } else if (!progData.success) {
                                clearInterval(checkInterval);
                                status.innerText = "Erro: O servidor bloqueou este vídeo.";
                                btn.innerText = "Tentar Novamente";
                                btn.style.opacity = "1";
                            } else {
                                status.innerText = `Processando... ${progData.progress / 10}% concluído`;
                            }
                        } catch(e) {
                            clearInterval(checkInterval);
                            status.innerText = "Falha na conexão durante a extração.";
                            btn.innerText = "Tentar Novamente";
                            btn.style.opacity = "1";
                        }
                    }, 3000); // 3000 = 3 segundos
                } else {
                    status.innerText = "Vídeo protegido por direitos autorais ou inválido.";
                    btn.innerText = "Tentar Novamente";
                    btn.style.opacity = "1";
                }
            } catch(e) {
                status.innerText = "Erro de conexão com o sistema de download.";
                btn.innerText = "Tentar Novamente";
                btn.style.opacity = "1";
            }
        };
    </script>
</body>
</html>
