<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Final</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 450px; background: #1a1a1a; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #000; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        .res { margin-top: 20px; display: none; }
        .dl-btn { display: block; background: #2ecc71; color: white; padding: 15px; text-decoration: none; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        <button id="btn">BUSCAR VÍDEO</button>
        <div id="msg" style="margin-top:10px; color:#ffcc00; font-size:14px;"></div>
        
        <div id="res" class="res">
            <img id="thumb" style="width:100%; border-radius:8px;">
            <p id="nome" style="margin:10px 0; font-size:14px;"></p>
            <select id="qualidade" style="width:100%; padding:10px; border-radius:5px;">
                <option value="1080">1080p (Full HD)</option>
                <option value="720" selected>720p (HD)</option>
                <option value="480">480p</option>
            </select>
            <a id="link" class="dl-btn" href="#" target="_blank">BAIXAR VÍDEO</a>
        </div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const url = document.getElementById('url').value;
            const msg = document.getElementById('msg');
            const res = document.getElementById('res');
            
            if(!url.includes('youtu')) return alert('Link inválido');
            
            msg.innerText = "Conectando ao motor de busca...";
            res.style.display = 'none';

            try {
                // A API do Cobalt é a única que consegue ignorar restrições de IP
                const resp = await fetch("https://co.wuk.sh/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url, vQuality: "720" })
                });
                
                const data = await resp.json();
                
                if(data.url) {
                    document.getElementById('thumb').src = data.thumbnail || '';
                    document.getElementById('nome').innerText = data.filename || 'Vídeo pronto';
                    document.getElementById('link').href = data.url;
                    res.style.display = 'block';
                    msg.innerText = "";
                } else {
                    msg.innerText = "Erro: O YouTube bloqueou o acesso. Tente outro vídeo.";
                }
            } catch(e) {
                msg.innerText = "Erro crítico: O servidor de download está offline ou bloqueado.";
            }
        };
    </script>
</body>
</html>
