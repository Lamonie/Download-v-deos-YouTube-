<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baixador de Vídeos</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #fff; --red: #ff0000; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--red); color: white; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; display: none; }
        #downloadBtn { background: #2ecc71; margin-top: 10px; display: block; text-decoration: none; padding: 15px; border-radius: 8px; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Baixador YT</h1>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        <button onclick="buscar()">Buscar Vídeo</button>
        
        <div id="loader" style="display:none; margin-top:20px;">Processando...</div>
        
        <div id="result" class="result">
            <img id="thumb" style="width:100%; border-radius:8px; margin-top:10px;">
            <p id="titulo" style="margin:10px 0; font-size: 14px;"></p>
            <a id="downloadBtn" href="#" target="_blank">BAIXAR VÍDEO AGORA</a>
        </div>
    </div>

    <script>
        async function buscar() {
            const url = document.getElementById('url').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            
            if(!url.includes('youtu')) return alert('Link inválido');
            
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const res = await fetch(`https://co.wuk.sh/api/json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, vQuality: "720" })
                });
                const data = await res.json();

                if(data.url) {
                    document.getElementById('thumb').src = data.thumbnail || '';
                    document.getElementById('titulo').innerText = data.filename || 'Vídeo Encontrado';
                    document.getElementById('downloadBtn').href = data.url;
                    result.style.display = 'block';
                } else {
                    alert('Erro ao processar. Tente outro vídeo.');
                }
            } catch(e) {
                alert('Erro de conexão.');
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
