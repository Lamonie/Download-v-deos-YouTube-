<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        <input type="text" id="url" placeholder="Cole o link do YouTube...">
        <button id="btn">BAIXAR VÍDEO</button>
    </div>
    <script>
        document.getElementById('btn').onclick = async () => {
            const url = document.getElementById('url').value;
            const btn = document.getElementById('btn');
            btn.innerText = "Processando...";
            const res = await fetch('/api/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            const data = await res.json();
            if(data.redirect) {
                window.location.href = data.redirect;
            } else {
                alert("Erro ao processar");
                btn.innerText = "BAIXAR VÍDEO";
            }
        };
    </script>
</body>
</html>
