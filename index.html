<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --accent: #ff0000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #res { margin-top: 25px; display: none; text-align: center; }
        .thumb { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .btn-dl { display: block; background: #2ecc71; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
        .legal { font-size: 11px; color: #666; margin-top: 25px; text-align: center; }
        #status { margin-top: 15px; color: #ffcc00; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h1>YTDown Pro</h1>
        <input type="text" id="url" placeholder="Cole o link do YouTube...">
        <select id="qual">
            <option value="1080">1080p</option>
            <option value="720" selected>720p</option>
        </select>
        <button id="btnBuscar">Buscar vídeo</button>
        <div id="status"></div>
        <div id="res">
            <img id="thumb" class="thumb">
            <p id="titulo"></p>
            <a id="btnDl" class="btn-dl" href="#" target="_blank">BAIXAR VÍDEO</a>
        </div>
        <p class="legal">Use apenas com vídeos que você possui ou tem permissão para baixar.</p>
    </div>

    <script>
        // CONFIGURAÇÃO: Coloque aqui o endpoint da API externa (ex: Cobalt)
        const API_DOWNLOAD_URL = "https://co.wuk.sh/api/json";

        document.getElementById('btnBuscar').onclick = async () => {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const res = document.getElementById('res');
            
            if(!url.includes('youtu')) return alert('URL inválida');
            
            status.innerText = "Buscando informações...";
            res.style.display = 'none';

            try {
                // Requisição para a API externa
                const response = await fetch(API_DOWNLOAD_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ url: url, vQuality: document.getElementById('qual').value })
                });

                const data = await response.json();

                if(data.url) {
                    document.getElementById('thumb').src = data.thumbnail || '';
                    document.getElementById('titulo').innerText = data.filename || 'Vídeo pronto';
                    document.getElementById('btnDl').href = data.url;
                    res.style.display = 'block';
                    status.innerText = "";
                } else {
                    status.innerText = "Erro: Servidor externo não retornou o link. Tente outro vídeo ou qualidade.";
                }
            } catch(e) {
                status.innerText = "Erro: Servidor externo offline ou bloqueado pelo navegador. Verifique a configuração da API.";
            }
        };
    </script>
</body>
</html>
