<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; padding: 20px; }
        .box { max-width: 500px; margin: 0 auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #aaa; text-align: center; }
        #result { margin-top: 20px; display: none; text-align: center; }
        .btn-dl { display: block; background: #2ecc71; color: white; padding: 15px; text-decoration: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>YTDown Pro</h1>
        <input type="text" id="url" placeholder="Cole o link do YouTube...">
        <button id="btnBuscar">Buscar Vídeo</button>
        <div id="status"></div>
        <div id="result">
            <img id="thumb" style="width:100%; border-radius:8px;">
            <p id="titulo" style="margin:10px 0;"></p>
            <a id="downloadBtn" class="btn-dl" href="#" target="_blank">BAIXAR VÍDEO</a>
        </div>
    </div>

    <script>
        document.getElementById('btnBuscar').onclick = async () => {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            if(!url.includes('youtu')) return alert('Link inválido');
            
            status.innerText = "Conectando ao servidor...";
            result.style.display = 'none';

            try {
                // Usando a API do Cobalt com parâmetros otimizados para evitar erro de CORS
                const response = await fetch("https://co.wuk.sh/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: url, vQuality: "720", isAudioOnly: false })
                });

                const data = await response.json();

                if(data.status === "redirect" || data.url) {
                    document.getElementById('thumb').src = data.thumbnail || '';
                    document.getElementById('titulo').innerText = data.filename || 'Vídeo encontrado';
                    document.getElementById('downloadBtn').href = data.url;
                    result.style.display = 'block';
                    status.innerText = "";
                } else if(data.status === "error") {
                    status.innerText = "Erro do servidor: " + data.text;
                } else {
                    status.innerText = "Vídeo não encontrado ou restrito.";
                }
            } catch(e) {
                status.innerText = "Erro de conexão: Tente novamente em alguns segundos.";
            }
        };
    </script>
</body>
</html>
