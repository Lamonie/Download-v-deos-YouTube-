<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 450px; background: #1a1a1a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; }
        label { font-size: 14px; color: #aaa; margin-bottom: 5px; display: block; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, select { background: #000; color: #fff; border: 1px solid #333; }
        button { background: #e50914; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; }
        
        /* A mágica acontece aqui: uma área invisível que vai carregar o botão final */
        #frameBaixar { width: 100%; height: 65px; border: none; display: none; margin-top: 10px; overflow: hidden; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        
        <label for="url">Link do Vídeo:</label>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        
        <label for="resolucao">Qualidade:</label>
        <select id="resolucao">
            <option value="1080">1080p (Alta Qualidade)</option>
            <option value="720" selected>720p (Padrão)</option>
            <option value="480">480p (Rápido)</option>
        </select>

        <button id="btnGerar">Preparar Vídeo</button>

        <iframe id="frameBaixar" scrolling="no"></iframe>
    </div>

    <script>
        document.getElementById('btnGerar').onclick = () => {
            const url = document.getElementById('url').value;
            const resolucao = document.getElementById('resolucao').value;
            const btn = document.getElementById('btnGerar');
            const frame = document.getElementById('frameBaixar');
            
            if(!url.includes('youtu')) return alert('Insira um link válido do YouTube.');

            btn.innerText = "Processando... aguarde";
            btn.style.opacity = "0.7";
            
            // Esconde o iframe temporariamente enquanto carrega o novo
            frame.style.display = "none";

            // Usamos a API robusta do Loader.to que permite escolher a resolução (f=resolucao)
            // Isso ignora totalmente as travas da Vercel e o CORS do iPhone
            const urlWidget = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=${resolucao}`;
            
            frame.src = urlWidget;
            
            // Dá 1 segundo e exibe a janela com o botão de download
            setTimeout(() => {
                frame.style.display = "block";
                btn.innerText = "Buscar Outro Vídeo";
                btn.style.opacity = "1";
            }, 1500);
        };
    </script>
</body>
</html>
