<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baixador de Vídeos do YouTube</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --btn-red: #ff0000;
            --btn-pink-bg: #ffe4e6;
            --btn-pink-text: #e11d48;
            --btn-dark: #262626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CABEÇALHO */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-btn.menu {
            background: var(--btn-red);
            border: none;
        }

        /* CONTAINER PRINCIPAL */
        .main-container {
            width: 100%;
            max-width: 700px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* ÁREA DE INPUT */
        .input-group {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 6px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 15px;
            font-size: 16px;
            outline: none;
        }

        .btn-paste {
            background: var(--btn-pink-bg);
            color: var(--btn-pink-text);
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-paste:active { opacity: 0.7; }

        .btn-search {
            background: var(--btn-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-search:active { background: #333; }

        /* LOADER GERAL */
        .loader {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--text-main);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-msg {
            color: var(--btn-red);
            margin-top: 15px;
            display: none;
        }

        /* RESULTADOS - INFORMAÇÃO E MÍDIA */
        #result-area {
            display: none;
            margin-top: 40px;
            text-align: left;
        }

        .section-title {
            background: #111;
            padding: 15px;
            text-align: center;
            font-weight: 500;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 0 0 8px 8px;
            margin-bottom: 20px;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .thumbnail-container img {
            width: 100%;
            display: block;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-meta {
            margin-top: 15px;
        }
        .video-author {
            color: var(--btn-red);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .video-title {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ÁREA MÍDIA (Dropdown) */
        .media-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 0 0 8px 8px;
        }

        .custom-select {
            width: 100%;
            background: #ffffff;
            color: #000;
            padding: 15px;
            border-radius: 4px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 15px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23000%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        .file-size {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .file-size::before, .file-size::after {
            content: "";
            height: 1px;
            background: var(--border-color);
            flex: 1;
        }

        .btn-download-final {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-download-final:active { background: #222; }
        
        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 15px;
        }

        .btn-reset {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 6px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            YTDown
        </div>
        <div class="header-icons">
            <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
            <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button>
            <button class="icon-btn menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
    </header>

    <div class="main-container">
        <h1>Baixador de Vídeos do YouTube</h1>
        <p class="subtitle">Grátis. Sem cadastro. Baixe agora.</p>

        <div class="input-group">
            <input type="text" id="url-input" placeholder="Cole seu link de vídeo do YouTube" autocomplete="off">
            <button class="btn-paste" id="btn-paste">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                Colar
            </button>
        </div>

        <button class="btn-search" id="btn-search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Baixar
        </button>

        <div class="loader" id="loader"></div>
        <div class="error-msg" id="error-msg"></div>

        <div id="result-area">
            
            <div class="section-title">Informação</div>
            <div class="info-card">
                <div class="thumbnail-container">
                    <img id="video-thumb" src="" alt="Thumbnail">
                    <div class="play-overlay">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>
                    </div>
                </div>
                <div class="video-meta">
                    <div class="video-author">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        <span id="video-author-text">Nome do Canal</span>
                    </div>
                    <div class="video-title" id="video-title-text">Título do vídeo vai aqui</div>
                </div>
            </div>

            <div class="section-title">Mídia</div>
            <div class="media-card">
                <select class="custom-select" id="format-select">
                    <option value="1080">MP4 - (1920x1080 FHD)</option>
                    <option value="720" selected>MP4 - (1280x720 HD)</option>
                    <option value="480">MP4 - (854x480 SD)</option>
                    <option value="360">MP4 - (640x360 SD)</option>
                    <option value="mp3">MP3 - Áudio (128k)</option>
                </select>

                <div class="file-size" id="file-size-text">Tamanho do arquivo: Calculando...</div>

                <button class="btn-download-final" id="btn-download-final">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Baixar
                </button>
                <div class="disclaimer">Ao baixar, você concorda com nossos termos e condições</div>
            </div>

            <button class="btn-reset" onclick="resetarUI()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                Baixar outra URL
            </button>

        </div>
    </div>

    <script>
        const inputUrl = document.getElementById('url-input');
        const btnPaste = document.getElementById('btn-paste');
        const btnSearch = document.getElementById('btn-search');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('error-msg');
        const resultArea = document.getElementById('result-area');
        const formatSelect = document.getElementById('format-select');
        const fileSizeText = document.getElementById('file-size-text');
        const btnFinalDownload = document.getElementById('btn-download-final');
        
        let currentVideoUrl = "";

        // Botão Colar
        btnPaste.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                inputUrl.value = text;
            } catch (err) {
                alert('Cole manualmente segurando o dedo no campo.');
            }
        });

        function resetarUI() {
            inputUrl.value = "";
            resultArea.style.display = 'none';
            errorMsg.style.display = 'none';
        }

        // Extrai o ID do vídeo do YouTube para gerar a foto
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Atualiza a estimativa de tamanho fictício para dar um visual realista
        formatSelect.addEventListener('change', () => {
            const val = formatSelect.value;
            let size = "15.4 MB"; // Padrão
            if (val === '1080') size = "145.2 MB";
            if (val === '720') size = "65.8 MB";
            if (val === '480') size = "32.1 MB";
            if (val === '360') size = "18.5 MB";
            if (val === 'mp3') size = "4.2 MB";
            fileSizeText.innerText = `Tamanho estimado: ~${size}`;
        });

        // 1. PRIMEIRA ETAPA: Buscar Informações do Vídeo (Totalmente Grátis via noembed)
        btnSearch.addEventListener('click', async () => {
            currentVideoUrl = inputUrl.value.trim();
            const videoId = getYouTubeID(currentVideoUrl);

            if (!videoId) {
                errorMsg.innerText = "URL do YouTube inválida.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = 'none';
            resultArea.style.display = 'none';
            loader.style.display = 'block';

            try {
                // API pública Noembed para pegar Título e Canal
                const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(currentVideoUrl)}`);
                const data = await res.json();

                if (data.error) throw new Error("Vídeo privado ou apagado");

                // Preenchendo a tela
                document.getElementById('video-title-text').innerText = data.title;
                document.getElementById('video-author-text').innerText = data.author_name;
                
                // Puxando a capa do vídeo (Thumbnail) direto dos servidores da Google
                document.getElementById('video-thumb').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                
                // Dispara o evento de change para calcular o peso fictício inicial
                formatSelect.dispatchEvent(new Event('change'));

                loader.style.display = 'none';
                resultArea.style.display = 'block';

            } catch (err) {
                loader.style.display = 'none';
                errorMsg.innerText = "Erro ao buscar detalhes do vídeo.";
                errorMsg.style.display = "block";
            }
        });

        // 2. SEGUNDA ETAPA: Forçar o Download via Cobalt API (Sem marca d'água, open-source)
        btnFinalDownload.addEventListener('click', async () => {
            const originalText = btnFinalDownload.innerHTML;
            btnFinalDownload.innerHTML = `<div class="loader" style="width:16px; height:16px; margin:0; border-width:2px;"></div> Gerando...`;
            btnFinalDownload.disabled = true;
            errorMsg.style.display = 'none';

            const selectedFormat = formatSelect.value;
            const isAudioOnly = selectedFormat === 'mp3';
            
            // Define o Payload que a API do Cobalt exige
            const payload = {
                url: currentVideoUrl,
                vQuality: isAudioOnly ? "720" : selectedFormat, // Se for áudio, passa qualquer vídeo e ele converte
                isAudioOnly: isAudioOnly,
                aFormat: "mp3"
            };

            try {
                // Requisição POST para o servidor Cobalt
                const response = await fetch("https://co.wuk.sh/api/json", {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === "error") {
                    throw new Error("API negou o download.");
                }

                // O Cobalt devolve o link final. Nós abrimos em uma nova aba para baixar.
                if (data.url) {
                    window.open(data.url, '_blank');
                }

            } catch (err) {
                errorMsg.innerText = "O servidor está sobrecarregado. Tente novamente em alguns minutos.";
                errorMsg.style.display = "block";
                // Rola a tela para o erro
                errorMsg.scrollIntoView({ behavior: "smooth" });
            } finally {
                btnFinalDownload.innerHTML = originalText;
                btnFinalDownload.disabled = false;
            }
        });

    </script>
</body>
</html>
