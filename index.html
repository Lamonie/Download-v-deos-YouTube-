<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 450px; background: #1a1a1a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; }
        label { font-size: 14px; color: #aaa; margin-bottom: 5px; display: block; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, select { background: #000; color: #fff; border: 1px solid #333; }
        button { background: #e50914; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; }
        #resultado { display: none; text-align: center; background: #222; padding: 20px; border-radius: 8px; margin-top: 10px; }
        .btn-baixar { display: inline-block; background: #2ecc71; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        
        <label for="url">Link do Vídeo:</label>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        
        <label for="resolucao">Qualidade:</label>
        <select id="resolucao">
            <option value="1080">1080p (Alta Qualidade)</option>
            <option value="720" selected>720p (Padrão)</option>
            <option value="480">480p (Rápido)</option>
        </select>

        <button id="btnGerar">Preparar Vídeo</button>

        <div id="resultado">
            <p style="margin-top: 0; color: #ccc;">✅ Vídeo processado com sucesso!</p>
            <a id="linkDownload" class="btn-baixar" href="#" target="_blank">⬇️ Baixar Arquivo</a>
        </div>
    </div>

    <script>
        document.getElementById('btnGerar').onclick = async () => {
            const url = document.getElementById('url').value;
            const resolucao = document.getElementById('resolucao').value;
            const btn = document.getElementById('btnGerar');
            const resultado = document.getElementById('resultado');
            
            if(!url.includes('youtu')) return alert('Insira um link válido do YouTube.');

            // Muda o status visual enquanto processa
            btn.innerText = "Processando... aguarde";
            btn.style.opacity = "0.7";
            resultado.style.display = 'none';

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url, quality: resolucao })
                });
                
                const data = await res.json();
                
                if(data.success) {
                    // Preenche o botão verde com o link e exibe na tela
                    document.getElementById('linkDownload').href = data.downloadUrl;
                    resultado.style.display = 'block';
                    btn.innerText = "Preparar Novo Vídeo";
                } else {
                    alert("Erro: " + (data.error || "Não foi possível gerar o link."));
                    btn.innerText = "Tentar Novamente";
                }
            } catch(e) {
                alert("Erro de comunicação com o servidor.");
                btn.innerText = "Preparar Vídeo";
            }
            btn.style.opacity = "1";
        };
    </script>
</body>
</html>
