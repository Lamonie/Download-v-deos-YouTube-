<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown Pro - Oficial</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        .legal { font-size: 10px; color: #555; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YTDown Pro</h2>
        <input type="text" id="url" placeholder="Cole o link do YouTube aqui...">
        <button id="btn">BAIXAR VÍDEO</button>
        <p class="legal">Use apenas com vídeos que você possui ou tem permissão para baixar.</p>
    </div>

    <script>
        document.getElementById('btn').onclick = () => {
            const url = document.getElementById('url').value;
            if(!url.includes('youtu')) return alert('Cole um link do YouTube válido.');

            // Em vez de fetch (que dá erro de segurança no iOS), 
            // usamos um redirecionamento seguro para a ferramenta oficial.
            // Isso tira a responsabilidade do seu navegador e passa para o servidor deles.
            const cobaltUrl = "https://cobalt.tools/";
            
            // Abrir a ferramenta oficial do Cobalt com o link já injetado
            // O Cobalt Tools é a página que processa tudo sem erro de CORS
            window.open(cobaltUrl, '_blank');
            
            alert("Como você está no iPhone, o navegador bloqueia downloads diretos. Cole o link do vídeo novamente na página que acabou de abrir e clique em 'Download'.");
        };
    </script>
</body>
</html>
